; /etc/php/8.3/fpm/pool.d/salud-total.conf
; Pool dedicado para Salud Total (timeouts largos por scraping)

[salud-total]
user = www-data
group = www-data

listen = /var/run/php/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; Timeout largo para consultas al portal (120 seg)
request_terminate_timeout = 120

; PHP settings para esta app
php_admin_value[max_execution_time] = 120
php_admin_value[upload_max_filesize] = 10M
php_admin_value[post_max_size] = 12M
php_admin_value[memory_limit] = 256M

; Logs
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.3-fpm-salud-total.log
