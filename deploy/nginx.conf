server {
    listen 80;
    server_name tu-dominio.com;  # Cambiar por tu dominio o IP

    root /var/www/salud-total/public;
    index index.php;

    charset utf-8;
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/salud-total-access.log;
    error_log /var/log/nginx/salud-total-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout alto para las consultas al portal (pueden tardar)
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # Bloquear acceso a archivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
